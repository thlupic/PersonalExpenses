<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Expenses</title>
  <link rel="stylesheet" href="styles.css" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Personal Expenses</h1>
      <p class="subtitle">Expense entry form</p>

      <form id="expenseForm">
        <div class="field">
          <label for="dateDisplay">Date</label>
          <input type="text" id="dateDisplay" name="dateDisplay" required />
        </div>

        <div class="field full">
          <label for="description">Description</label>
          <input
            type="text"
            id="description"
            name="description"
            list="descriptionList"
            placeholder="Start typing or enter your own value"
            required
          />
          <datalist id="descriptionList"></datalist>
        </div>

        <div class="field full">
          <label for="location">Location</label>
          <input
            type="text"
            id="location"
            name="location"
            list="locationList"
            placeholder="Start typing or enter your own value"
            required
          />
          <datalist id="locationList"></datalist>
        </div>

        <div class="field">
          <label for="quantity">Quantity</label>
          <input
            type="number"
            id="quantity"
            name="quantity"
            step="0.01"
            min="0.01"
            placeholder="0.00"
            required
          />
        </div>

        <div class="field">
          <label for="expenseType">Expense Type</label>
          <select id="expenseType" name="expenseType" required>
            <option value="">Loading...</option>
          </select>
        </div>

        <div class="field">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            name="amount"
            step="0.01"
            min="0.01"
            placeholder="0.00"
            required
          />
        </div>

        <div class="actions">
          <button type="submit" class="primary">Save</button>
          <button type="reset" class="secondary">Reset</button>
        </div>
      </form>

      <div id="message" class="message"></div>
      <pre id="output"></pre>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/default.js"></script>
  <script src="app.js"></script>
</body>
</html>
